<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/index.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Practica Pixar</title>
  </head>
  <body>
    <div class="Navbar">
      <div class="Navbar-logo">
        <img src="./assets/logo-pixar.png" alt="" class="logo" />
      </div>
      <div class="Navbar-navigation">
        <div class="Navbar-item"><a href="">Feature Films</a></div>
        <div class="Navbar-item"><a href="">Short Films</a></div>
        <div class="Navbar-item"><a href="">Technology</a></div>
        <div class="Navbar-item"><a href="">Careers</a></div>
        <div class="Navbar-item"><a href="">Extras</a></div>
        <div class="Navbar-item"><a href="">About</a></div>
      </div>
    </div>
    <div class="Main">
      <div class="Main-content">
        <img src="./assets/insideout-logo.png" alt="" class="Main-img" />
      </div>
    </div>
    <div class="Content">
      <div class="Content-item">
        <img src="./assets/Toystory.png" alt="" class="Content-img" />
        <p class="Content-item-description">Carrers at pixar</p>
      </div>
      <div class="Content-item">
        <img src="./assets/Winlose.png" alt="" class="Content-img" />
        <p class="Content-item-description">Elio</p>
      </div>
      <div class="Content-item">
        <img src="./assets/Hoopers.png" alt="" class="Content-img" />
        <p class="Content-item-description">Win or Lose</p>
      </div>
    </div>
    <div class="Footer">
      <div class="Footer-social">
        <div class="Social-logo">
          <img src="./assets/facebook.svg" alt="logo Facebook" />
        </div>
        <div class="Social-logo">
          <img src="./assets/twitter.svg" alt="logo Twitter" />
        </div>
        <div class="Social-logo">
          <img src="./assets/youtube.svg" alt="logo Youtube" />
        </div>
        <div class="Social-logo">
          <img src="./assets/instagram.svg" alt="logo Instagram" />
        </div>
      </div>
      <div class="Footer-info">
        <div class="Footer-privacy">
          <div class="privacy">Privacy policy</div>
          <div class="privacy">Terms of use</div>
        </div>
        <div class="privacy">Your US State Privacy Rights</div>
        <div class="Footer-children">
          <div class="privacy">Children’s Online Privacy Policy</div>
          <div class="privacy">Interest-Based Ads</div>
        </div>
      </div>
      <div class="privacy">© 1986-2023 disney / pixar</div>
      <div class="button">
        <div class="button-item">
          Do Not Sell or Share My Personal Information
        </div>
      </div>
    </div>
  </body>
</html>
